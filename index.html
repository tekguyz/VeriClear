<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VeriClear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        background-image: radial-gradient(#262626 1px, transparent 0);
        background-size: 20px 20px;
        background-attachment: fixed;
      }
      @keyframes glow {
        0% { box-shadow: 0 0 5px rgba(66, 133, 244, 0); }
        50% { box-shadow: 0 0 20px 5px rgba(66, 133, 244, 0.4); }
        100% { box-shadow: 0 0 5px rgba(66, 133, 244, 0); }
      }
      .card-glow:hover {
        animation: glow 2s infinite ease-in-out;
      }
      @keyframes bounce {
        0%, 20%, 50%, 80%, 100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-10px);
        }
        60% {
          transform: translateY(-5px);
        }
      }
      .animate-bounce-slow {
        animation: bounce 2s infinite;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-in-out;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              'primary-background': '#0a0a0a',
              'accent-primary': '#4285F4',
              'text-primary': '#fafafa',
              'panel-background': '#171717',
              'border-color': '#262626',
            }
          }
        }
      }
    </script>
  <script type="importmap">

    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.4",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "zustand": "https://aistudiocdn.com/zustand@^5.0.8",
    "zod": "https://aistudiocdn.com/zod@^3.23.8",
    "date-fns": "https://aistudiocdn.com/date-fns@^3.6.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.26.0"
  }
}
</script>
</head>

  </body>
</html>
