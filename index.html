    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Light Mode - Maximum Contrast */
        --color-primary-background: #f4f4f5;
        --color-panel-background: #ffffff;
        --color-interactive-background-hover: #e4e4e7;
        --color-input-background: #ffffff;
        --color-accent-background: #4285F4;
        --color-accent-background-hover: #3367D6;
        --color-subtle-background: #f8fafc;

        --color-text-primary: #09090b; /* Zinc-950 */
        --color-text-secondary: #27272a; /* Zinc-800 - Significant contrast improvement */
        --color-text-accent: #2563eb;
        --color-text-inverted: #ffffff;
        --color-text-placeholder: #52525b; /* Zinc-600 */
        
        --color-border-color: #d4d4d8;
        --color-icon-primary: #18181b; /* Zinc-900 */
        
        --color-notice-background: #fef3c7;
        --color-notice-text: #92400e;
      }

      html.dark {
        --color-primary-background: #0a0a0a;
        --color-panel-background: #171717;
        --color-interactive-background-hover: #262626;
        --color-input-background: #202020;
        --color-accent-background: #4285F4;
        --color-accent-background-hover: #3367D6;
        --color-subtle-background: #1c1c1c;

        --color-text-primary: #fafafa;
        --color-text-secondary: #a1a1aa;
        --color-text-accent: #4285F4;
        --color-text-inverted: #0a0a0a;
        --color-text-placeholder: #71717a;
        
        --color-border-color: #262626;
        --color-icon-primary: #a1a1aa;
        
        --color-notice-background: rgba(234, 179, 8, 0.2);
        --color-notice-text: #fde047;
      }
      
      body {
        background-color: var(--color-primary-background);
        color: var(--color-text-primary);
        background-size: 20px 20px;
        background-attachment: fixed;
      }

      html:not(.dark) body {
        background-image: radial-gradient(#d4d4d8 1px, transparent 0);
      }
      html.dark body {
        background-image: radial-gradient(#262626 1px, transparent 0);
      }

      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .animate-fade-in { animation: fadeIn 0.3s ease-out; }

      .thin-scrollbar::-webkit-scrollbar { width: 6px; }
      .thin-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .thin-scrollbar::-webkit-scrollbar-thumb {
        background-color: var(--color-border-color);
        border-radius: 20px;
      }
    </style>
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('vericlear-theme');
          // Force dark by default if no preference is explicitly set
          if (theme === 'dark' || !theme) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
          
          const accentColor = localStorage.getItem('vericlear-accent-color');
          if (accentColor) {
              document.documentElement.style.setProperty('--color-accent-background', accentColor);
              document.documentElement.style.setProperty('--color-text-accent', accentColor);
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();

      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              'primary-background': 'var(--color-primary-background)',
              'panel-background': 'var(--color-panel-background)',
              'interactive-background-hover': 'var(--color-interactive-background-hover)',
              'input-background': 'var(--color-input-background)',
              'subtle-background': 'var(--color-subtle-background)',
              'accent-primary': 'var(--color-accent-background)',
              'accent-primary-hover': 'var(--color-accent-background-hover)',
              'text-primary': 'var(--color-text-primary)',
              'text-secondary': 'var(--color-text-secondary)',
              'text-accent': 'var(--color-text-accent)',
              'text-inverted': 'var(--color-text-inverted)',
              'text-placeholder': 'var(--color-text-placeholder)',
              'border-color': 'var(--color-border-color)',
              'icon-primary': 'var(--color-icon-primary)',
              'notice-background': 'var(--color-notice-background)',
              'notice-text': 'var(--color-notice-text)',
            }
          }
        }
      }
    </script>
